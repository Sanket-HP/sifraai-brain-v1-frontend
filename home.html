<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIFRA AI | Professional Command Node</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        orbitron: ['Orbitron', 'sans-serif'],
                    },
                    colors: {
                        sifra: {
                            bg: '#030712',
                            panel: '#0f172a',
                            border: '#1e293b',
                            cyan: '#06b6d4',
                            purple: '#8b5cf6',
                            success: '#10b981',
                            error: '#ef4444'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-slow': 'spin 3s linear infinite',
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Glassmorphism Panels */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        .input-glow:focus-within {
            border-color: rgba(6, 182, 212, 0.5);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.1);
        }

        /* Terminal Text Styling */
        .log-entry { margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; }
        .log-info { color: #94a3b8; }
        .log-success { color: #34d399; }
        .log-error { color: #f87171; }
        .log-warn { color: #fbbf24; }
    </style>
</head>
<body class="bg-sifra-bg text-slate-200 font-sans h-screen overflow-hidden flex">

    <!-- Sidebar Navigation -->
    <aside class="w-20 lg:w-64 bg-sifra-bg border-r border-sifra-border flex flex-col items-center lg:items-stretch transition-all duration-300 z-20">
        <!-- Logo Area -->
        <div class="h-16 flex items-center justify-center lg:justify-start lg:px-6 border-b border-sifra-border">
            <div class="w-8 h-8 rounded bg-gradient-to-br from-cyan-500 to-purple-600 flex items-center justify-center text-white font-bold font-orbitron shadow-lg shadow-cyan-500/20 shrink-0">S</div>
            <span class="ml-3 font-orbitron font-bold text-white tracking-widest hidden lg:block">SIFRA <span class="text-cyan-400">AI</span></span>
        </div>

        <!-- Menu -->
        <nav class="flex-1 py-6 space-y-2 px-2">
            <a href="#" class="flex items-center gap-3 px-3 py-3 text-cyan-400 bg-cyan-500/10 rounded-lg border border-cyan-500/20 transition-all group">
                <i class="fas fa-terminal w-5 text-center"></i>
                <span class="hidden lg:block text-sm font-medium">Command Center</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-lg transition-all group">
                <i class="fas fa-database w-5 text-center"></i>
                <span class="hidden lg:block text-sm font-medium">Datasets</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-lg transition-all group">
                <i class="fas fa-network-wired w-5 text-center"></i>
                <span class="hidden lg:block text-sm font-medium">Integrations</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-lg transition-all group">
                <i class="fas fa-cog w-5 text-center"></i>
                <span class="hidden lg:block text-sm font-medium">Settings</span>
            </a>
        </nav>

        <!-- Status Footer -->
        <div class="p-4 border-t border-sifra-border hidden lg:block">
            <div class="text-xs text-slate-500 mb-1 font-mono">BACKEND STATUS</div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                <span class="text-xs text-green-400 font-medium">Localhost:8000</span>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col relative overflow-hidden">
        <!-- Background Effects -->
        <div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-purple-900/20 via-transparent to-transparent pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-full h-full bg-[radial-gradient(ellipse_at_bottom_left,_var(--tw-gradient-stops))] from-cyan-900/10 via-transparent to-transparent pointer-events-none"></div>

        <!-- Top Header -->
        <header class="h-16 border-b border-sifra-border flex items-center justify-between px-8 bg-sifra-bg/50 backdrop-blur-md z-10">
            <h1 class="text-lg font-orbitron font-medium text-white flex items-center gap-2">
                <i class="fas fa-layer-group text-slate-500"></i>
                Task Execution
            </h1>
            <div class="flex items-center gap-4">
                <button class="w-8 h-8 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center transition">
                    <i class="fas fa-bell text-slate-400 text-xs"></i>
                </button>
                <div class="w-8 h-8 rounded-full bg-gradient-to-r from-cyan-500 to-blue-500 p-[1px]">
                    <div class="w-full h-full rounded-full bg-sifra-bg flex items-center justify-center text-xs font-bold">JD</div>
                </div>
            </div>
        </header>

        <!-- Content Grid -->
        <div class="flex-1 overflow-y-auto p-6 lg:p-8 grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Left Column: Input & Controls (5 Cols) -->
            <div class="lg:col-span-5 space-y-6">
                
                <!-- Task Config Panel -->
                <div class="glass-panel rounded-xl p-1">
                    <div class="bg-sifra-bg/50 p-4 rounded-t-lg border-b border-white/5 flex items-center justify-between">
                        <h2 class="text-sm font-bold text-white flex items-center gap-2">
                            <i class="fas fa-sliders text-purple-400"></i> Configuration
                        </h2>
                    </div>
                    <div class="p-5 space-y-5">
                        <!-- Goal Selector -->
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Operational Goal</label>
                            <div class="relative">
                                <select id="goal" class="w-full bg-[#0B1221] border border-white/10 text-sm text-white rounded-lg px-4 py-3 appearance-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition-all cursor-pointer">
                                    <option value="analyze">🔍 Deep Analysis</option>
                                    <option value="model">🤖 Train Model</option>
                                    <option value="forecast">📈 Predictive Forecast</option>
                                    <option value="anomaly">⚠️ Anomaly Detection</option>
                                    <option value="insights">💡 Strategic Insights</option>
                                </select>
                                <i class="fas fa-chevron-down absolute right-4 top-3.5 text-slate-500 text-xs pointer-events-none"></i>
                            </div>
                        </div>

                        <!-- Data Input Area -->
                        <div class="space-y-2">
                            <div class="flex justify-between items-center">
                                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Input Stream (CSV)</label>
                                <button class="text-[10px] text-cyan-400 hover:text-cyan-300" onclick="loadSampleData()">Load Sample</button>
                            </div>
                            <div class="relative group">
                                <div class="absolute -inset-0.5 bg-gradient-to-r from-cyan-500/20 to-purple-500/20 rounded-lg blur opacity-0 group-hover:opacity-100 transition duration-500"></div>
                                <textarea id="rawData" rows="10" class="relative w-full bg-[#0B1221] border border-white/10 rounded-lg p-4 font-mono text-xs text-slate-300 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition-all resize-none leading-relaxed input-glow" placeholder="// Paste CSV Data Here...
x,y
1,100
2,250
3,180"></textarea>
                            </div>
                            <p class="text-[10px] text-slate-500 flex items-center gap-1">
                                <i class="fas fa-info-circle"></i> Supports comma-separated values. First row represents headers.
                            </p>
                        </div>

                        <!-- Action Button -->
                        <button onclick="runSifra()" id="runBtn" class="w-full relative group overflow-hidden rounded-lg p-[1px]">
                            <div class="absolute inset-0 bg-gradient-to-r from-cyan-500 to-purple-600 transition-all duration-300 group-hover:brightness-125"></div>
                            <div class="relative bg-sifra-bg/90 hover:bg-transparent transition-all rounded-lg py-3 px-4 flex items-center justify-center gap-2">
                                <span class="font-orbitron font-bold text-white tracking-wide text-sm group-hover:text-white transition-colors">INITIALIZE ENGINE</span>
                                <i class="fas fa-bolt text-cyan-400 group-hover:text-white transition-colors"></i>
                            </div>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Column: Console & Output (7 Cols) -->
            <div class="lg:col-span-7 flex flex-col gap-6 h-full">
                
                <!-- System Console -->
                <div class="glass-panel rounded-xl border-t-2 border-t-cyan-500/50 flex flex-col h-64 lg:h-1/3">
                    <div class="bg-black/40 px-4 py-2 flex items-center justify-between border-b border-white/5">
                        <div class="flex items-center gap-2">
                            <i class="fas fa-terminal text-cyan-400 text-xs"></i>
                            <span class="text-xs font-bold text-slate-300 font-mono">SYSTEM LOG</span>
                        </div>
                        <div class="flex gap-1.5">
                            <div class="w-2.5 h-2.5 rounded-full bg-red-500/20 border border-red-500/50"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-yellow-500/20 border border-yellow-500/50"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-green-500/20 border border-green-500/50"></div>
                        </div>
                    </div>
                    <div id="consoleLog" class="flex-1 bg-[#050a14] p-4 overflow-y-auto font-mono text-xs space-y-1 scroll-smooth">
                        <div class="log-entry log-info">> System Ready.</div>
                        <div class="log-entry log-info">> Waiting for input stream...</div>
                    </div>
                </div>

                <!-- Results Viewer -->
                <div class="glass-panel rounded-xl flex-1 flex flex-col min-h-[400px] border-t-2 border-t-purple-500/50 relative overflow-hidden">
                    <div class="bg-black/40 px-4 py-3 flex items-center justify-between border-b border-white/5">
                        <h3 class="font-orbitron text-sm font-bold text-white flex items-center gap-2">
                            <i class="fas fa-code text-purple-400"></i> JSON Output
                        </h3>
                        <span id="statusTag" class="text-[10px] px-2 py-0.5 rounded bg-slate-800 text-slate-400 border border-white/10">IDLE</span>
                    </div>
                    
                    <div class="flex-1 relative bg-[#0B1221]">
                        <!-- Placeholder State -->
                        <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-600">
                            <i class="fas fa-cube text-4xl mb-3 opacity-20 animate-pulse"></i>
                            <span class="text-xs font-mono">No data processed yet.</span>
                        </div>

                        <!-- Actual Content -->
                        <pre id="outputContent" class="absolute inset-0 p-6 overflow-auto text-xs font-mono text-cyan-100 hidden custom-scrollbar leading-relaxed"></pre>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        const BACKEND_URL = "http://localhost:8000";
        const consoleLog = document.getElementById('consoleLog');
        const outputContent = document.getElementById('outputContent');
        const placeholder = document.getElementById('placeholder');
        const statusTag = document.getElementById('statusTag');
        const runBtn = document.getElementById('runBtn');

        function loadSampleData() {
            document.getElementById('rawData').value = `id,value,category
1,150,A
2,300,B
3,450,A
4,120,C
5,600,B
6,780,A`;
            logToConsole("Sample data loaded into buffer.", "info");
        }

        function logToConsole(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `log-entry log-${type}`;
            const timestamp = new Date().toLocaleTimeString('en-US', { hour12: false });
            div.innerText = `[${timestamp}] ${message}`;
            consoleLog.appendChild(div);
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        function parseCSV(raw) {
            try {
                const rows = raw.trim().split("\n");
                if (rows.length < 1) throw new Error("Empty CSV");
                
                const headers = rows[0].split(",").map(h => h.trim());
                const data = [];
                
                for (let i = 1; i < rows.length; i++) {
                    const values = rows[i].split(",");
                    if (values.length === headers.length) {
                        // Try to convert numbers
                        const row = values.map(v => {
                            const num = parseFloat(v.trim());
                            return isNaN(num) ? v.trim() : num;
                        });
                        data.push(row);
                    }
                }
                return { headers, data };
            } catch (e) {
                throw new Error("CSV Parsing Failed: " + e.message);
            }
        }

        async function runSifra() {
            const goal = document.getElementById("goal").value;
            const raw = document.getElementById("rawData").value;

            if (!raw.trim()) {
                logToConsole("Error: Input buffer is empty.", "error");
                alert("Please enter CSV data first.");
                return;
            }

            // UI State: Processing
            runBtn.disabled = true;
            runBtn.classList.add('opacity-75', 'cursor-not-allowed');
            statusTag.innerText = "PROCESSING";
            statusTag.className = "text-[10px] px-2 py-0.5 rounded bg-yellow-500/20 text-yellow-400 border border-yellow-500/30 animate-pulse";
            
            placeholder.classList.add('hidden');
            outputContent.classList.remove('hidden');
            outputContent.innerText = ""; // Clear previous

            logToConsole("Initializing SIFRA Engine...", "info");

            try {
                // 1. Parse Data
                logToConsole("Parsing CSV input...", "info");
                const parsed = parseCSV(raw);
                logToConsole(`Parsed ${parsed.data.length} rows successfully.`, "success");

                // 2. Prepare Payload
                const payload = {
                    goal: goal,
                    data: parsed.data,
                    columns: parsed.headers
                };

                // 3. Send Request
                logToConsole(`Sending payload to ${BACKEND_URL}/run...`, "warn");
                
                const startTime = performance.now();
                const res = await fetch(`${BACKEND_URL}/run`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);

                const json = await res.json();
                const endTime = performance.now();
                const duration = ((endTime - startTime) / 1000).toFixed(2);

                // 4. Handle Success
                logToConsole(`Response received in ${duration}s.`, "success");
                outputContent.innerText = JSON.stringify(json, null, 2);
                
                statusTag.innerText = "COMPLETE";
                statusTag.className = "text-[10px] px-2 py-0.5 rounded bg-green-500/20 text-green-400 border border-green-500/30";

            } catch (err) {
                // 5. Handle Error
                logToConsole(`FATAL ERROR: ${err.message}`, "error");
                outputContent.innerText = `// ERROR LOG\n\n${err.stack || err.message}`;
                
                statusTag.innerText = "FAILED";
                statusTag.className = "text-[10px] px-2 py-0.5 rounded bg-red-500/20 text-red-400 border border-red-500/30";
            } finally {
                runBtn.disabled = false;
                runBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
